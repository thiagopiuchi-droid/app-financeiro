<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Financeiro PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
  <div class="card">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" class="hidden">

<div class="topbar">
  <button onclick="toggleMenu()">☰</button>
</div>

<div id="menu" class="hidden menu">
  <button onclick="logout()">Logout</button>
</div>

<h1>💰 Financeiro</h1>

<input id="desc" placeholder="Descrição">
<input id="valor" type="number" placeholder="Valor">

<select id="categoria">
<option>Alimentação</option>
<option>Gasolina</option>
<option>Transporte</option>
<option>Salário</option>
<option>Outros</option>
</select>

<input type="date" id="data">

<div class="buttons">
<button onclick="add('receita')" class="green">Receita</button>
<button onclick="add('despesa')" class="red">Despesa</button>
<button onclick="limpar()">🧹 Limpar</button>
</div>

<h2 id="saldo">Saldo: R$ 0</h2>

<canvas id="grafico"></canvas>

<div id="historico"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>

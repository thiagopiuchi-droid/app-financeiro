<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>App Financeiro V12 PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>Dashboard</h1>
<h2>Saldo: <span id="saldo">R$ 0.00</span></h2>

<input id="descricao" placeholder="Descrição">
<input id="valor" placeholder="Valor">
<select id="tipo">
  <option value="receita">Receita</option>
  <option value="despesa">Despesa</option>
</select>

<button onclick="salvarMovimento()">Salvar</button>
<button onclick="zerarDados()">Zerar Tudo</button>

<h2>Movimentos</h2>
<ul id="lista"></ul>

<h2>Gráfico</h2>
<canvas id="grafico"></canvas>

<script src="dashboard.js"></script>
</body>
</html>

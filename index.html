<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Financeiro V29.1 ULTRA</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>
<body>

<div class="container">

<div id="menuBtn">☰</div>

<div id="menu">
  <button onclick="logout()">Logout</button>
  <button onclick="resetarDados()">Zerar tudo</button>
</div>

<h1>Financeiro ULTRA</h1>

<div id="loginBox">
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">
  <input id="valor" type="number" placeholder="Valor">
  <input id="desc" placeholder="Descrição">
  <button onclick="addReceita()">Receita</button>
  <button onclick="addDespesa()">Despesa</button>

  <h2 id="saldo"></h2>

  <canvas id="grafico" width="300" height="200"></canvas>

  <ul id="lista"></ul>
</div>

</div>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>

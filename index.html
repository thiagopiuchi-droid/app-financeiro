<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro MASTER</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="loginScreen">
  <h2>Login</h2>
  <input type="email" id="email" placeholder="Email">
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">
  <div id="menuBtn" onclick="toggleMenu()">☰</div>
  <div id="menu" class="hidden">
    <button onclick="logout()">Logout</button>
    <button onclick="zerar()">Zerar Tudo</button>
  </div>

  <h1>Financeiro MASTER</h1>

  <input id="valor" type="number" placeholder="Valor">
  <input id="descricao" placeholder="Descrição">
  <input id="data" type="date">

  <button onclick="add('receita')">Receita</button>
  <button onclick="add('despesa')">Despesa</button>

  <h2 id="saldo"></h2>

  <canvas id="grafico"></canvas>

  <ul id="lista"></ul>
</div>

<script src="app.js"></script>
</body>
</html>

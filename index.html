<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financeiro V26</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="container center fade">
  <h2>Entrar</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Senha">
  <button onclick="login()">Login</button>
  <button onclick="register()">Criar conta</button>
</div>

<!-- APP -->
<div id="app" class="container fade">
  <div class="top">
    <button onclick="logout()">Logout</button>
    <h2>💰 Financeiro</h2>
  </div>

  <input id="nome" placeholder="Descrição">
  <input id="valor" type="number" placeholder="Valor">
  <select id="categoria">
    <option>Salário</option>
    <option>Uber</option>
    <option>Gasolina</option>
  </select>
  <input id="data" type="date">

  <button onclick="salvar('receita')">Receita</button>
  <button onclick="salvar('despesa')">Despesa</button>

  <h2 id="saldo">Saldo: R$ 0</h2>
  <canvas id="grafico"></canvas>
  <div id="historico"></div>
</div>

<script src="app.js"></script>
</body>
</html>

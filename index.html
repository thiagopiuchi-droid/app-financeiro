<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financeiro MASTER</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <h1>Financeiro MASTER</h1>

    <input type="number" id="valor" placeholder="Valor">
    <input type="text" id="descricao" placeholder="Descrição">
    <input type="date" id="data">

    <div class="buttons">
      <button onclick="adicionar('receita')">Receita</button>
      <button onclick="adicionar('despesa')">Despesa</button>
    </div>

    <h2 id="saldo">Saldo: R$ 0.00</h2>

    <canvas id="grafico"></canvas>

    <ul id="historico"></ul>

    <button onclick="zerar()">Zerar Tudo</button>
  </div>

  <script src="app.js"></script>
</body>
</html>

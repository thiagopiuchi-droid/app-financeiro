<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>💰 Financeiro</h2>

<input id="desc" placeholder="Descrição">
<input id="valor" type="number" step="0.01" placeholder="Valor">

<select id="categoria">
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Salário</option>
</select>

<input id="data" type="date">

<button onclick="add('receita')">Receita</button>
<button onclick="add('despesa')">Despesa</button>

<h3 id="saldo">Saldo: R$ 0.00</h3>

<select id="filtroMes" onchange="filtrar()"></select>

<ul id="lista"></ul>

<button onclick="toggleDark()">🌙</button>

<script src="js/app.js"></script>
</body>
</html>
